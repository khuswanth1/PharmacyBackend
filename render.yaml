services:
  # 1. API Gateway (Public Web Service)
  - type: web
    name: api-gateway
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    dockerTarget: api-gateway
    plan: free
    startCommand: ""
    envVars:
      - key: PORT
        value: 8089
      - key: AUTH_SERVICE_URL
        value: http://auth-service:8081
      - key: PRODUCT_SERVICE_URL
        value: http://product-service:8082
      - key: CART_SERVICE_URL
        value: http://cart-service:8083
      - key: ORDER_SERVICE_URL
        value: http://order-service:8084
      - key: PAYMENT_SERVICE_URL
        value: http://payment-service:8085
      - key: FRONTEND_ORIGIN
        sync: false
      - key: FRONTEND_OAUTH_REDIRECT
        sync: false

  # 2. Auth Service (Private Service)
  - type: pserv
    name: auth-service
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    dockerTarget: auth-service
    plan: free
    startCommand: ""
    envVars:
      - key: PORT
        value: 8081
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 3306
      - key: DB_NAME
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false

  # 3. Product Service (Private Service)
  - type: pserv
    name: product-service
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    dockerTarget: product-service
    plan: free
    startCommand: ""
    envVars:
      - key: PORT
        value: 8082
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 3306
      - key: DB_NAME
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false

  # 4. Cart Service (Private Service)
  - type: pserv
    name: cart-service
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    dockerTarget: cart-service
    plan: free
    startCommand: ""
    envVars:
      - key: PORT
        value: 8083
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 3306
      - key: DB_NAME
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false

  # 5. Order Service (Private Service)
  - type: pserv
    name: order-service
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    dockerTarget: order-service
    plan: free
    startCommand: ""
    envVars:
      - key: PORT
        value: 8084
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 3306
      - key: DB_NAME
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false

  # 6. Payment Service (Private Service)
  - type: pserv
    name: payment-service
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    dockerTarget: payment-service
    plan: free
    startCommand: ""
    envVars:
      - key: PORT
        value: 8085
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 3306
      - key: DB_NAME
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
